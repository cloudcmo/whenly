<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Whenly</title>
  <meta name="description" content="Play past Whenly questions. Browse the full archive and test yourself on previous daily year-guessing games." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://whenly.co.uk/archive.html" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #faf9f7;
      --white:      #ffffff;
      --ink:        #1a1a1a;
      --ink-light:  #6b6b6b;
      --ink-faint:  #c8c8c8;
      --border:     #e0ddd8;
      --green:      #4a7c59;
      --green-bg:   #edf4ef;
      --green-dark: #1e4d38;
      --orange:     #d4600a;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
    }

    html { font-size: 16px; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: relative;
      flex-shrink: 0;
      background: var(--white);
    }
    .logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-decoration: none;
      line-height: 1;
    }
    .logo img { height: 26px; width: auto; display: block; }
    .logo-sub {
      font-family: var(--font-sans);
      font-size: 0.575rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    .burger {
      background: none; border: none; cursor: pointer;
      padding: 8px; display: flex; flex-direction: column;
      gap: 5px; z-index: 200;
    }
    .burger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; transition: all 0.2s; }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-menu {
      display: none; position: absolute; top: 56px; right: 0; left: 0;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 100; padding: 8px 0;
    }
    .nav-menu.open { display: block; }
    .nav-menu a {
      display: block; padding: 12px 24px;
      font-size: 0.9375rem; font-weight: 500;
      color: var(--ink); text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .nav-menu a:last-child { border-bottom: none; }
    .nav-menu a:hover { background: var(--cream); }
    .nav-menu a.active { color: var(--green); }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
      padding: 36px 20px 60px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 0.875rem;
      color: var(--ink-light);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── SHARE NUDGE ── */
    .share-row { margin-bottom: 28px; }
    .share-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 24px; background: var(--green); color: white;
      border: none; border-radius: 10px;
      font-family: var(--font-sans); font-size: 0.9375rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .share-btn:hover { background: var(--green-dark); }
    .share-sub { margin-top: 8px; font-size: 0.8rem; color: var(--ink-faint); }

    /* ── ARCHIVE LIST ── */
    .archive-list { display: flex; flex-direction: column; gap: 8px; }

    .archive-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.12s, transform 0.08s;
    }
    .archive-item:hover { border-color: var(--ink); transform: translateY(-1px); }
    .archive-item.played { background: var(--green-bg); border-color: var(--green); }
    .archive-item.today { border-color: var(--orange); }

    .archive-left { display: flex; flex-direction: column; gap: 3px; }
    .archive-date {
      font-size: 0.9375rem;
      font-weight: 500;
      line-height: 1.3;
    }
    .archive-score {
      font-size: 0.75rem;
      color: var(--green);
      font-weight: 600;
      display: none;
    }
    .archive-item.played .archive-score { display: block; }

    .archive-right { display: flex; align-items: center; gap: 8px; }
    .today-tag {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--orange);
      background: #fdf0e8;
      border: 1px solid #f0c8a0;
      border-radius: 20px;
      padding: 2px 8px;
    }
    .archive-chevron { color: var(--ink-faint); font-size: 1.1rem; line-height: 1; }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 48px 0; color: var(--ink-light); font-size: 0.875rem; }
    .loading-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink-faint);
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 16px 24px;
      font-size: 0.75rem;
      color: var(--ink-faint);
      flex-shrink: 0;
    }
    footer a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <img src="/whenly-wordmark.png" alt="Whenly" />
    <span class="logo-sub">Daily guess the year</span>
  </a>
  <button class="burger" id="burgerBtn" aria-label="Menu" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-menu" id="navMenu">
    <a href="/">Today's questions</a>
    <a href="/archive.html" class="active">Archive</a>
    <a href="mailto:hello@whenly.co.uk">Send feedback</a>
  </nav>
</header>

<main>
  <h1 class="page-title">Archive</h1>
  <p class="page-subtitle">Missed a day? Play any past set — including today's.<br>Your scores are shown where you've already played.</p>

  <div class="share-row">
    <button class="share-btn" onclick="shareWhenly()">
      Share Whenly
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>
    <p class="share-sub">Challenge a friend — see who knows their history</p>
  </div>

  <div id="archiveList">
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      Loading archive…
    </div>
  </div>
</main>

<footer>
  Fresh questions every day &nbsp;·&nbsp; Whenly &nbsp;·&nbsp; <a href="mailto:hello@whenly.co.uk">Feedback</a>
</footer>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────
  // Update this to the date of your very first set of questions
  const FIRST_DATE    = '2026-03-29';
  const STORAGE_KEY   = 'whenly_state';
  const ARCHIVE_KEY   = 'whenly_archive';

  // ── HELPERS ─────────────────────────────────────────────────────
  function formatDate(iso) {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-GB', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function getPastDates() {
    const dates  = [];
    const today  = new Date().toISOString().slice(0, 10);
    const start  = new Date(FIRST_DATE + 'T12:00:00');
    const cur    = new Date(today + 'T12:00:00');
    while (cur >= start) {
      dates.push(cur.toISOString().slice(0, 10));
      cur.setDate(cur.getDate() - 1);
    }
    return dates;
  }

  function loadMainState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function loadArchiveScores() {
    try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY)) || {}; }
    catch { return {}; }
  }

  function scoreLabel(points) {
    if (points === undefined || points === null) return '';
    return `${points}/50`;
  }

  // ── RENDER ──────────────────────────────────────────────────────
  function render() {
    const dates        = getPastDates();
    const mainState    = loadMainState();
    const archiveScores = loadArchiveScores();
    const today        = new Date().toISOString().slice(0, 10);

    // Pull today's score from main state if finished
    const scores = { ...archiveScores };
    if (mainState.date && mainState.points !== undefined &&
        Object.keys(mainState.answered || {}).length > 0) {
      scores[mainState.date] = mainState.points;
    }

    const list = document.getElementById('archiveList');

    if (dates.length === 0) {
      list.innerHTML = '<p style="color:var(--ink-light);font-size:0.875rem;">No questions yet — check back soon!</p>';
      return;
    }

    list.innerHTML = '<div class="archive-list">' + dates.map(date => {
      const isToday   = date === today;
      const hasScore  = scores[date] !== undefined;
      const pts       = scores[date];
      const playedCls = hasScore ? ' played' : '';
      const todayCls  = isToday && !hasScore ? ' today' : '';
      const label     = isToday ? `Today — ${formatDate(date)}` : formatDate(date);

      return `
        <a class="archive-item${playedCls}${todayCls}" href="/?date=${date}">
          <div class="archive-left">
            <span class="archive-date">${label}</span>
            ${hasScore ? `<span class="archive-score">${scoreLabel(pts)} — ${getVerdict(pts)}</span>` : ''}
          </div>
          <div class="archive-right">
            ${isToday && !hasScore ? '<span class="today-tag">Today</span>' : ''}
            <span class="archive-chevron">›</span>
          </div>
        </a>`;
    }).join('') + '</div>';
  }

  function getVerdict(pts) {
    if (pts >= 48) return 'Extraordinary!';
    if (pts >= 40) return 'Brilliant';
    if (pts >= 32) return 'Solid effort';
    if (pts >= 22) return 'Not bad';
    if (pts >= 12) return 'Tricky one';
    return 'Better luck next time';
  }

  // ── SHARE ────────────────────────────────────────────────────────
  function shareWhenly() {
    const text = `Whenly — guess the year, every day 📅\n\nCan you work out when things happened? Free daily quiz at whenly.co.uk`;
    if (navigator.share) {
      navigator.share({ title: 'Whenly', text, url: 'https://whenly.co.uk' }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text + '\nhttps://whenly.co.uk').then(() => {
        const btn = document.querySelector('.share-btn');
        const orig = btn.innerHTML;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.innerHTML = orig, 2000);
      });
    }
  }

  // ── NAV ──────────────────────────────────────────────────────────
  function toggleMenu() {
    document.getElementById('burgerBtn').classList.toggle('open');
    document.getElementById('navMenu').classList.toggle('open');
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('header')) {
      document.getElementById('burgerBtn').classList.remove('open');
      document.getElementById('navMenu').classList.remove('open');
    }
  });

  render();
</script>
</body>
</html>
